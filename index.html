<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planificador Diario de Macros</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Plan diario de comidas</h1>
        <p class="subtitle">Versión vanilla · planificación simple del día</p>
      </header>

      <section class="card" aria-labelledby="daily-config-title">
        <h2 id="daily-config-title">Configuración diaria</h2>

        <label for="dailyCalorieGoal">Objetivo de calorías del día (kcal)</label>
        <input id="dailyCalorieGoal" name="dailyCalorieGoal" type="number" min="0" step="1" inputmode="numeric" placeholder="Ej: 2200" />

        <label for="mealsCount">Cantidad de comidas</label>
        <input id="mealsCount" name="mealsCount" type="number" min="1" max="12" step="1" inputmode="numeric" value="3" />
      </section>

      <section class="card" aria-labelledby="daily-summary-title">
        <h2 id="daily-summary-title">Resumen diario</h2>
        <div class="summary-grid" role="status" aria-live="polite">
          <article class="result-item">
            <h3>Proteínas</h3>
            <p><span id="dailyProtein">0.0</span> g</p>
          </article>
          <article class="result-item">
            <h3>Carbohidratos</h3>
            <p><span id="dailyCarbs">0.0</span> g</p>
          </article>
          <article class="result-item">
            <h3>Grasas</h3>
            <p><span id="dailyFat">0.0</span> g</p>
          </article>
          <article class="result-item">
            <h3>Calorías consumidas</h3>
            <p><span id="dailyCalories">0</span> kcal</p>
          </article>
          <article class="result-item">
            <h3>Objetivo calórico</h3>
            <p><span id="dailyGoal">0</span> kcal</p>
          </article>
          <article class="result-item">
            <h3>Calorías restantes</h3>
            <p><span id="dailyRemaining">0</span> kcal</p>
          </article>
        </div>
      </section>

      <section id="mealsContainer" class="meals" aria-label="Comidas del día"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
